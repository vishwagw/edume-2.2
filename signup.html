<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Edume Learning</title>
<link rel="stylesheet" href="/css/styles.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg,#F0FBF6 0%,#FFF9F0 100%); padding:2rem 1rem; }
  .auth-card { background:white; border-radius:20px; border:1px solid var(--border); padding:2.5rem; width:100%; max-width:460px; box-shadow:0 8px 40px rgba(0,0,0,0.07); }
  .auth-logo { display:flex; align-items:center; gap:10px; font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:800; color:var(--teal); text-decoration:none; margin-bottom:2rem; justify-content:center; }
  .auth-logo-icon { width:36px; height:36px; border-radius:9px; background:var(--teal); color:white; display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:800; }
  .auth-title { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; color:var(--ink); margin-bottom:0.4rem; }
  .auth-sub { font-size:0.875rem; color:var(--ink-muted); margin-bottom:1.75rem; }
  .role-selector { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-bottom:1.5rem; }
  .role-card { border:2px solid var(--border); border-radius:12px; padding:1rem; cursor:pointer; text-align:center; transition:all 0.2s; background:white; }
  .role-card:hover { border-color:var(--teal-light); }
  .role-card.selected { border-color:var(--teal); background:var(--teal-pale); }
  .role-icon { font-size:1.5rem; margin-bottom:0.3rem; }
  .role-name { font-size:0.875rem; font-weight:600; color:var(--ink); }
  .role-desc { font-size:0.72rem; color:var(--ink-faint); margin-top:2px; }
  .google-btn { width:100%; padding:0.65rem; border:1.5px solid var(--border); border-radius:9px; background:white; cursor:pointer; font-family:'DM Sans'; font-size:0.9rem; font-weight:500; display:flex; align-items:center; justify-content:center; gap:10px; transition:all 0.2s; }
  .google-btn:hover { border-color:var(--teal); background:var(--teal-pale); }
  .divider { display:flex; align-items:center; gap:1rem; margin:1.25rem 0; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
  .divider span { font-size:0.78rem; color:var(--ink-faint); }
  .auth-footer { text-align:center; font-size:0.83rem; color:var(--ink-muted); margin-top:1.5rem; }
  .auth-footer a { color:var(--teal); text-decoration:none; font-weight:600; }
  .terms { font-size:0.72rem; color:var(--ink-faint); text-align:center; margin-top:1rem; }
  .terms a { color:var(--teal); text-decoration:none; }
</style>
</head>
<body>

<div class="auth-card">
  <a href="/index.html" class="auth-logo">
    <div class="auth-logo-icon">E</div>
    Edume Learning
  </a>

  <div class="auth-title">Create your account</div>
  <p class="auth-sub">Join 25,000+ Sri Lankan learners and educators.</p>

  <!-- Role selector -->
  <div class="role-selector">
    <div class="role-card selected" id="role-student" onclick="selectRole('student')">
      <div class="role-icon">🎓</div>
      <div class="role-name">I'm a Student</div>
      <div class="role-desc">Learn & grow your skills</div>
    </div>
    <div class="role-card" id="role-instructor" onclick="selectRole('instructor')">
      <div class="role-icon">🏫</div>
      <div class="role-name">I'm a Teacher</div>
      <div class="role-desc">Teach & earn income</div>
    </div>
  </div>
  <input type="hidden" id="selected-role" value="student">

  <button class="google-btn" onclick="signUpWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Sign up with Google
  </button>

  <div class="divider"><span>or sign up with email</span></div>

  <div id="error-msg" style="display:none;background:var(--coral-pale);color:var(--coral);font-size:0.82rem;padding:10px 12px;border-radius:8px;margin-bottom:1rem"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
    <div class="form-group">
      <label class="form-label">First name</label>
      <input type="text" id="fname" class="form-input" placeholder="Kasun">
    </div>
    <div class="form-group">
      <label class="form-label">Last name</label>
      <input type="text" id="lname" class="form-input" placeholder="Perera">
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Email address</label>
    <input type="email" id="email" class="form-input" placeholder="you@example.com">
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input type="password" id="password" class="form-input" placeholder="At least 8 characters">
  </div>

  <button class="btn btn-primary btn-full btn-lg" id="signup-btn" onclick="signUp()">
    Create Account — It's Free
  </button>

  <p class="terms">By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>

  <div class="auth-footer">
    Already have an account? <a href="/login.html">Log in</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/ui.js"></script>
<script>
  edumeDB.getCurrentUser().then(user => {
    if (user) window.location.href = '/student-dashboard.html';
  });

  function selectRole(role) {
    document.getElementById('selected-role').value = role;
    document.getElementById('role-student').classList.toggle('selected', role === 'student');
    document.getElementById('role-instructor').classList.toggle('selected', role === 'instructor');
  }

  async function signUp() {
    const fname    = document.getElementById('fname').value.trim();
    const lname    = document.getElementById('lname').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const role     = document.getElementById('selected-role').value;
    const btn      = document.getElementById('signup-btn');
    const errorEl  = document.getElementById('error-msg');
    errorEl.style.display = 'none';

    if (!fname || !lname || !email || !password) {
      errorEl.textContent = 'Please fill in all fields.';
      errorEl.style.display = 'block'; return;
    }
    if (password.length < 8) {
      errorEl.textContent = 'Password must be at least 8 characters.';
      errorEl.style.display = 'block'; return;
    }

    setLoading(btn, true, 'Create Account — It\'s Free');

    const { data, error } = await edumeDB.sb.auth.signUp({
      email, password,
      options: {
        data: { full_name: `${fname} ${lname}`, role }
      }
    });

    setLoading(btn, false, 'Create Account — It\'s Free');

    if (error) {
      errorEl.textContent = error.message;
      errorEl.style.display = 'block';
    } else {
      // Profile is created by Supabase trigger (see schema.sql)
      showToast('Account created! Check your email to verify.', 'success', 6000);
      setTimeout(() => {
        window.location.href = role === 'instructor'
          ? '/instructor-dashboard.html'
          : '/student-dashboard.html';
      }, 2000);
    }
  }

  async function signUpWithGoogle() {
    const role = document.getElementById('selected-role').value;
    await edumeDB.sb.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/student-dashboard.html',
        queryParams: { role }
      }
    });
  }
</script>
</body>
</html>
